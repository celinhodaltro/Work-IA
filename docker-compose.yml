version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: work-ia-postgres
    environment:
      POSTGRES_USER: workia
      POSTGRES_PASSWORD: workia123
      POSTGRES_DB: workia
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: work-ia-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: workia
      RABBITMQ_DEFAULT_PASS: workia123

  redis:
    image: redis:7-alpine
    container_name: work-ia-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
