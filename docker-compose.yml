# SQLite é o banco padrão (portabilidade total - sem dependências externas)
# RabbitMQ e Redis são opcionais para desenvolvimento avançado
# Para usar: docker compose up -d rabbitmq redis

services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: work-ia-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: workia
      RABBITMQ_DEFAULT_PASS: workia123
    profiles:
      - optional

  redis:
    image: redis:7-alpine
    container_name: work-ia-redis
    ports:
      - "6379:6379"
    profiles:
      - optional
